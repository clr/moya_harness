{{- range $w := .Values.workloads }}
{{- if and $w.service.enabled $w.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "distributed-app.workloadFullname" (dict "root" $ "workload" $w) }}
  labels:
{{ include "distributed-app.labels" (dict "root" $ "workload" $w) | indent 4 }}
spec:
  ingressClassName: {{ $w.ingress.className }}
  rules:
    - host: {{ $w.ingress.host }}
      http:
        paths:
          - path: {{ $w.ingress.path }}
            pathType: {{ $w.ingress.pathType }}
            backend:
              service:
                name: {{ include "distributed-app.workloadFullname" (dict "root" $ "workload" $w) }}
                port:
                  number: {{ $w.service.port }}
  {{- if $w.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $w.ingress.host }}
      secretName: {{ $w.ingress.tls.secretName }}
  {{- end }}
---
{{- end }}
{{- end }}
