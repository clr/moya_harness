global:
  imagePullSecrets: []
  environment: dev

workloads:
  - name: api
    replicas: 2
    image:
      repository: ghcr.io/your-org/api
      tag: latest
      pullPolicy: IfNotPresent
    containerPort: 8080
    service:
      enabled: true
      type: ClusterIP
      port: 80
      targetPort: 8080
    ingress:
      enabled: false
      className: nginx
      host: api.example.com
      path: /
      pathType: Prefix
      tls:
        enabled: false
        secretName: ""
    env:
      PORT: "8080"
      DATABASE_URL: postgresql://app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70

  - name: worker
    replicas: 1
    image:
      repository: ghcr.io/your-org/worker
      tag: latest
      pullPolicy: IfNotPresent
    containerPort: 8081
    service:
      enabled: false
      type: ClusterIP
      port: 8081
      targetPort: 8081
    ingress:
      enabled: false
      className: nginx
      host: worker.example.com
      path: /
      pathType: Prefix
      tls:
        enabled: false
        secretName: ""
    env:
      DATABASE_URL: postgresql://app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
