name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: your-org
  HELM_RELEASE: distributed-app
  HELM_CHART_PATH: deploy/helm/distributed-app
  K8S_NAMESPACE: default

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Replace with language-specific setup and test commands.
      - name: Placeholder checks
        run: |
          echo "Add lint/test commands here"

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        service: [api, worker]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Assumes service Dockerfiles at services/<service>/Dockerfile
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      # Store kubeconfig in secret named KUBE_CONFIG_STAGING.
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade/install
        run: |
          helm upgrade --install "$HELM_RELEASE" "$HELM_CHART_PATH" \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            -f "$HELM_CHART_PATH/values.yaml" \
            -f "$HELM_CHART_PATH/values-staging.yaml" \
            --set workloads[0].image.repository="${REGISTRY}/${IMAGE_NAMESPACE}/api" \
            --set workloads[0].image.tag="${GITHUB_SHA}" \
            --set workloads[1].image.repository="${REGISTRY}/${IMAGE_NAMESPACE}/worker" \
            --set workloads[1].image.tag="${GITHUB_SHA}"

      # Replace with real endpoint checks.
      - name: Smoke test placeholder
        run: |
          kubectl get pods -n "$K8S_NAMESPACE"
          echo "Add smoke tests for staging here"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade/install
        run: |
          helm upgrade --install "$HELM_RELEASE" "$HELM_CHART_PATH" \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            -f "$HELM_CHART_PATH/values.yaml" \
            -f "$HELM_CHART_PATH/values-prod.yaml" \
            --set workloads[0].image.repository="${REGISTRY}/${IMAGE_NAMESPACE}/api" \
            --set workloads[0].image.tag="${GITHUB_SHA}" \
            --set workloads[1].image.repository="${REGISTRY}/${IMAGE_NAMESPACE}/worker" \
            --set workloads[1].image.tag="${GITHUB_SHA}"
