services:
  moya_db:
    build:
      context: ${DB_REPO:-../moya_db}
    image: ${DB_IMAGE:-moya_db:latest}
    container_name: moya_db
    ports:
      - "9000:9000"

  manager:
    build:
      context: ${SQUEEZER_REPO:-../moya_squeezer}
      args:
        BASE_IMAGE: ${BASE_IMAGE:-elixir:1.19.0}
    image: ${SQUEEZER_IMAGE:-moya_squeezer:latest}
    container_name: manager
    hostname: manager
    depends_on:
      - moya_db
    volumes:
      - ${SQUEEZER_REPO:-../moya_squeezer}/config:/app/config:ro
      - ${SQUEEZER_REPO:-../moya_squeezer}/logs:/app/logs
    command:
      [
        "sh",
        "-lc",
        "ERL_LIBS=/app/_build/dev/lib elixir --sname manager --cookie squeeze_cookie -e 'Application.ensure_all_started(:moya_squeezer); case MoyaSqueezer.run(\"config/docker.toml\", worker_nodes: [:\"worker1@worker1\", :\"worker2@worker2\", :\"worker3@worker3\"]) do :ok -> :ok; {:error, reason} -> IO.puts(reason); System.halt(1) end'"
      ]

  worker1:
    image: ${SQUEEZER_IMAGE:-moya_squeezer:latest}
    container_name: worker1
    hostname: worker1
    depends_on:
      - manager
    restart: on-failure
    command:
      [
        "sh",
        "-lc",
        "ERL_LIBS=/app/_build/dev/lib elixir --sname worker1 --cookie squeeze_cookie -e 'Application.ensure_all_started(:moya_squeezer); case MoyaSqueezer.run_worker(:\"manager@manager\") do :ok -> :ok; {:error, reason} -> IO.puts(reason); System.halt(1) end'"
      ]

  worker2:
    image: ${SQUEEZER_IMAGE:-moya_squeezer:latest}
    container_name: worker2
    hostname: worker2
    depends_on:
      - manager
    restart: on-failure
    command:
      [
        "sh",
        "-lc",
        "ERL_LIBS=/app/_build/dev/lib elixir --sname worker2 --cookie squeeze_cookie -e 'Application.ensure_all_started(:moya_squeezer); case MoyaSqueezer.run_worker(:\"manager@manager\") do :ok -> :ok; {:error, reason} -> IO.puts(reason); System.halt(1) end'"
      ]

  worker3:
    image: ${SQUEEZER_IMAGE:-moya_squeezer:latest}
    container_name: worker3
    hostname: worker3
    depends_on:
      - manager
    restart: on-failure
    command:
      [
        "sh",
        "-lc",
        "ERL_LIBS=/app/_build/dev/lib elixir --sname worker3 --cookie squeeze_cookie -e 'Application.ensure_all_started(:moya_squeezer); case MoyaSqueezer.run_worker(:\"manager@manager\") do :ok -> :ok; {:error, reason} -> IO.puts(reason); System.halt(1) end'"
      ]
