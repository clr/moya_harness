# Harness-wide defaults for local cluster launches.
#
# Precedence (low -> high):
# 1) script defaults
# 2) this file
# 3) environment variables
# 4) CLI flags

[cluster]
network_name = "moya_net"

[moya_db]
node_count = 1
base_port = 9000
image = "moya_db:latest"

[moya_squeezer]
manager_name = "manager"
worker_count = 3
cookie = "squeeze_cookie"
config_template_path = "config/docker.toml"
config_effective_path = "config/generated/docker.effective.toml"

[squeeze]
# Optional runtime overrides written into the effective squeezer config.
start_requests_per_second = 1500
# Ready-to-run example: concurrency ramp with fixed total target RPS.
ramp_mode = "concurrency"      # "rps" | "concurrency"
total_target_rps = 15000
initial_active_workers = 3
worker_step = 1
worker_step_interval_seconds = 1
max_active_workers = 100

# Used by classic rps ramp mode (ignored by concurrency mode).
rps_step = 50
# requests_per_second = 500
duration_seconds = 10
# warmup_seconds = 10
